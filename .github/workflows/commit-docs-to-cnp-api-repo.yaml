name: Commit docs to CNP API Github repository

# Copied and adapted from https://github.com/hmcts/workflow-publish-openapi-spec/blob/main/.github/workflows/publish-openapi.yml

on:
  workflow_call:
    inputs:
      API_NAME_INTERNAL:
        required: true
        type: string
        description: The name of the API spec file to publish, as generated by generate-openapi-specs.
          This is *not* always the same as the API to be published.

      API_NAME_EXTERNAL:
        required: true
        type: string
        description: The name of the API to publish to the CNP API Github repo.
          This is *not* always the same as the file generated by generate-openapi-specs.
    secrets:
      SWAGGER_PUBLISHER_API_TOKEN:
        required: true
        description: GitHub API token that can publish to the cnp-api-docs repository

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Commit docs to CNP API repository
        env:
          API_NAME_INTERNAL: ${{ inputs.API_NAME_INTERNAL }}
          API_NAME_EXTERNAL: ${{ inputs.API_NAME_EXTERNAL }}
          SWAGGER_PUBLISHER_API_TOKEN: ${{ secrets.SWAGGER_PUBLISHER_API_TOKEN }}
        run: |
          mkdir openapi-staging
          cd openapi-staging
          git init
          git config set advice.defaultBranchName false
          git config user.email "github-platform-operations@HMCTS.NET"
          git config user.name "HMCTS Platform Operations"
          git remote add upstream "https://apitoken:${SWAGGER_PUBLISHER_API_TOKEN}@github.com/hmcts/cnp-api-docs.git"
          git pull upstream master
          repo=`echo "$GITHUB_REPOSITORY" | cut -f2- -d/`
          echo "$(cat specs/${API_NAME_INTERNAL}.json)" > "docs/specs/${API_NAME_TO_PUBLISH}.json"
          git add "docs/specs/${API_NAME_TO_PUBLISH}.json"
          # Only commit and push if we have changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update spec for ${API_NAME_TO_PUBLISH}#${GITHUB_SHA:7}"; git push --set-upstream upstream master)
