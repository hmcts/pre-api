name: Publish OpenAPI specs
on:
# Temporarily changing this from push to pull_request to test it without pushing to master
# TODO: Change to push just before merge
#  push:
  pull_request:
    branches:
      - "master"

jobs:
  publish-pre-api:
    # TODO: Change to @master just before merge
    uses: hmcts/pre-api/.github/workflows/publish-openapi-to-cnp-repo.yaml@a428cf4e8c362c7b619268c33f6451431a7e45d0
    secrets:
      SWAGGER_PUBLISHER_API_TOKEN: ${{ secrets.SWAGGER_PUBLISHER_API_TOKEN }}
    with:
      test_to_run: 'uk.gov.hmcts.reform.preapi.openapi.OpenAPIPublisher'
      api_name: 'pre-api'
      java_version: 17
  publish-b2c-api:
    # TODO: Change to @master just before merge
    uses: hmcts/pre-api/.github/workflows/publish-openapi-to-cnp-repo.yaml@a428cf4e8c362c7b619268c33f6451431a7e45d0
    secrets:
      SWAGGER_PUBLISHER_API_TOKEN: ${{ secrets.SWAGGER_PUBLISHER_API_TOKEN }}
    with:
      test_to_run: 'uk.gov.hmcts.reform.preapi.openapi.OpenAPIPublisher'
      java_version: 17
      api_name: 'pre-api-b2c'
