name: Generate OpenAPI and Swagger docs, bump API version, and commit to branch
on:
  pull_request:
    branches:
      - master

jobs:
  update-openapi-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'gradle'

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install API spec converter dependency
        run: npm install -g api-spec-converter@2.12.0 --ignore-scripts

      - name: Update main API
        env:
          API_NAME: 'pre-api'
          RUN_DB_MIGRATION_ON_STARTUP: false
        run: |
          ./gradlew buildOpenApiSpecs --tests 'uk.gov.hmcts.reform.preapi.openapi.OpenAPIPublisher'
          echo "Generated OpenAPI doc for ${API_NAME}"
          bash ./scripts/increment-apim-revision-and-commit.sh

      - name: Update B2C API
        env:
          API_NAME: 'b2c-api'
          RUN_DB_MIGRATION_ON_STARTUP: false
        run: |
          ./gradlew buildOpenApiSpecs --tests 'uk.gov.hmcts.reform.preapi.openapi.OpenAPIPublisher'
          echo "Generated OpenAPI doc for ${API_NAME}"

      - name: Add alert comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
           CHANGED=$(git diff --name-only "specs/pre-api.json" pre-api-stg.yaml)

           if [ "$CHANGED" != "" ]; then

            const commentBody = `## :x: Change to API Spec detected
            This pull request updates the Open API specification.

            Monitor carefully when deploying to production, as sometimes the APIM fails at deployment stage.

            Follow the release process and manually check that the Streaming Manager is up after the release.

            See https://tools.hmcts.net/confluence/spaces/S28/pages/1958069495/API+release+process for details.`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Change to API Spec detected')
            );
            // If no existing comment, create new one
            if (!botComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
           fi
